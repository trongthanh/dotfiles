# start numbering from 1 since 0 is far from the home row
set -g base-index 1
# allow passing escape sequences
set -g allow-passthrough on

# Reduce escape delay so Ctrl+key sequences aren't swallowed
set -sg escape-time 0

# Enable extended key protocol so Ctrl+Shift/Ctrl+special keys pass through to Neovim
set -g extended-keys on
set -ga terminal-features "*:extkeys"
set -g extended-keys-format csi-u

# Enable true 24-bit color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set-option -ga terminal-overrides ",:Ss=:\e[%p1%d q,:Se=\e[0 q"

# enable mouse
set -g mouse on

# enable for nvim autoread
set -g focus-events on

# Cursor style: bar (hairline) instead of block
set -g cursor-style bar

# Increase history for Claude's verbose outputs
set -g history-limit 10000

# UTF-8 support for Claude's formatted responses
setw -q -g utf8 on

# Window title
set -g set-titles on
set -g set-titles-string "#S: #W"

# Dracula theme (manual, no plugin required)
set -g status-style bg='#282a36',fg='#f8f8f2'
set -g status-left '#[bg=#bd93f9,fg=#282a36,bold] #S #[bg=#282a36,fg=#bd93f9]'
set -g status-right '#[fg=#6272a4] %H:%M  %Y-%m-%d '
set -g status-right-length 40

# Active window
set -g window-status-current-style bg='#44475a',fg='#bd93f9',bold
set -g window-status-current-format ' #I:#W#{?window_zoomed_flag, 🔍,} '

# Inactive windows
set -g window-status-style bg='#282a36',fg='#6272a4'
set -g window-status-format ' #I:#W '

# Pane borders
set -g pane-border-style fg='#44475a'
set -g pane-active-border-style fg='#bd93f9'

# Message bar
set -g message-style bg='#44475a',fg='#f8f8f2'

# Stacked layout: main top pane + 3-line bottom pane for sub-processes
bind-key S split-window -v -l 3

# Re-layout existing panes into stacked top/bottom with 3-line bottom pane
bind-key R select-layout even-vertical \; resize-pane -t '{bottom}' -y 3

# Pass Shift+Enter as CSI u sequence so Claude Code (and other apps) receive it correctly
bind-key -n S-Enter send-keys Escape "[13;2u"

# Close current pane with Ctrl+x (no prefix), with confirmation
bind-key -n C-x confirm-before -p "Kill pane? (y/n)" kill-pane

# Prevent accidental pane close with Ctrl-D at shell prompt
# When at a shell prompt (bash/zsh/fish/sh), ask Y/N before sending Ctrl-D (EOF -> exit).
# Other apps (vim, less, python, cat, ssh, etc.) get Ctrl-D passed through unaffected.
bind-key -n C-d if-shell 'tmux display-message -p "#{pane_current_command}" | grep -Eq "^(bash|zsh|fish|sh)$"' 'confirm-before -p "Exit shell? (y/n)" "send-keys C-d"' 'send-keys C-d'
# GLM fixed:
# bind-key -n C-d if-shell 'tmux display-message -p "#{pane_current_command}" | grep -Eq "^(bash|zsh|fish|sh)$"' 'confirm-before -p "Exit shell? (y/n)" {send-keys C-d}' 'send-keys C-d'


# Pane switching with Ctrl+Shift+arrow keys
bind-key -n C-S-Up select-pane -U
bind-key -n C-S-Left select-pane -L
bind-key -n C-S-Right select-pane -R
bind-key -n C-S-Down select-pane -D

# Window switching with Ctrl+0, Ctrl+1, Ctrl+2, Ctrl+3 (no prefix)
bind-key -n M-0 select-window -t 0
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4


source-file "$HOME/.config/kaku/tmux/kaku.tmux.conf" # Kaku tmux Integration
